services:
  frontend-server:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend-server
    volumes:
      - ./frontend/app:/app/app
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/next.config.mjs:/app/next.config.mjs
    develop:
      watch:
        - action: sync
          path: ./frontend/app
          target: /app/app
        - action: sync
          path: ./frontend/public
          target: /app/public
        - action: rebuild
          path: ./frontend/package.json

  backend-server:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src:/app/src
      - ./backend/pom.xml:/app/pom.xml
      - ./backend/target:/app/target
      - m2:/root/.m2
    command: ./mvnw spring-boot:run
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src
        - action: sync
          path: ./backend/pom.xml
          target: /app/pom.xml
        - action: rebuild
          path: ./backend/pom.xml

volumes:
  m2:
